spring.application.name=fuenteEstatica
server.port=8081
app.base-url=http://localhost:8081

# Configuración de la base de datos
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configuración de sincronización de entities contra la base de datos

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


# Configuración JWT (validador)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8090/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=servicio-usuarios

logging.level.org.springframework.security=INFO

# jwt key

jwt.secret.base64= ${JWT_PS}