spring.application.name=fuenteEstatica
server.port=8081
app.base-url=http://localhost:8081

# Configuraciµn de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/meta_mapa_estatica?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configuraciµn de sincronizaciµn de entities contra la base de datos

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


# Configuraciµn JWT (validador)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8090/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=servicio-usuarios

logging.level.org.springframework.security=INFO

