spring.application.name=servicioEstadisticas
server.port=${SERVER_PORT}

agregador.base-url=${AGREGADOR_BASE_URL}

estadisticas.cantDiasPersistencia=${ESTADISTICAS_CANTDIASPERSISTENCIA}

jwt.secret.base64= ${JWT_SECRET_BASE64}

# Crons
cron.calculoEstadisticas= 0 0 6 */7 * *
cron.eliminarEstadisticas=0 0 1 * * Mon


# Configuración de la base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configuración de sincronización de entities contra la base de datos

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# para ver los logs
logging.level.ar.edu.utn.frba.dds=INFO