spring.application.name=fuenteDinamica
server.port=${SERVER_PORT}

# Configuracion de negocio del sistema
hecho.diasModificacion=7
hecho.diasSugerencia=7
cron.hechos.rechazarSugerencia= 0 0 0 * * *
app.pagination.hechos.size = 20


# Configuración de la base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configuración de sincronización de entities contra la base de datos
# Asegúrate de tener esta configuración
spring.jpa.hibernate.ddl-auto=update
# O para desarrollo (cuidado, borra y recrea todo):
# spring.jpa.hibernate.ddl-auto=create-drop

# Para ver las consultas SQL que ejecuta Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Remueve o comenta esta línea (como sugiere el warning):
# hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# O actualízala a:
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# jwt key
jwt.secret.base64= ${JWT_SECRET_BASE64}