# Nombre de la app
spring.application.name=Servicio Agregaciˇn

app.agregador-url=http://localhost:8080

server.port=8080

# URLs de fuentes
app.fuenteEstatica-url=http://localhost:8081
app.fuenteDinamica-url=http://localhost:8082
app.fuenteProxy-url=http://localhost:8083

app.fuente.tipos.almacenados=ESTATICA,DINAMICA
app.fuente.tipos.consumidos=PROXY

# Cron expressions
cron.expression.prueba=0 * * * * *
cron.expression=0 0 * * * *
cron.curacionColecciones=0 0 0 * * *

#Actualizacion proxy
hechos.proxy.actualizacion.duracion=PT20M
