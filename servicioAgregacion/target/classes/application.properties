# Nombre de la app
spring.application.name= servicioAgregaciµn
server.port=8080
app.agregador-url=http://localhost:8080



# URLs de fuentes
app.fuenteEstatica-url=http://localhost:8081
app.fuenteDinamica-url=http://localhost:8082
app.fuenteProxy-url=http://localhost:8083

app.fuente.tipos.almacenados=ESTATICA,DINAMICA
app.fuente.tipos.consumidos=PROXY

# Cron expressions
cron.expression.prueba=0 * * * * *
cron.expression=0 0 * * * *
cron.curacionColecciones=0 0 0 * * *

#Actualizacion proxy
hechos.proxy.actualizacion.duracion=PT20M

# Configuraciµn de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/meta_mapa_agregador?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configuraciµn de sincronizaciµn de entities contra la base de datos

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

