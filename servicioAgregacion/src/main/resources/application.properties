# Nombre de la app
spring.application.name=Servicio Agregación

# URLs de fuentes
app.fuenteEstatica-url=http://localhost:8081
app.fuenteDinamica-url=http://localhost:8082
app.fuenteProxy-url=http://localhost:8083

# Fuentes agrupadas
fuentes.manuales=${app.fuenteEstatica-url},${app.fuenteDinamica-url},${app.fuenteProxy-url}
fuentes.automaticas=${app.fuenteEstatica-url},${app.fuenteDinamica-url}

# Cron expressions
cron.expression.prueba=0 * * * * *
cron.expression=0 0 * * * *