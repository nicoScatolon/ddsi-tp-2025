spring.application.name=servicioUsuarios
server.port=8090

jwt.secret.base64= ${JWT_PS}
app.usuarios-url=http://localhost:8090

# URLs de fuentes
app.clienteGrafico-url=http://localhost:8089

# Configuración de la base de datos
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de sincronización de entities contra la base de datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect