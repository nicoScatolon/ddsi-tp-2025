spring.application.name=fileSystem
# Hardcodear puerto para evitar problemas con variables
server.port=${SERVER_PORT}

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=0

# Directorio hardcodeado (coincide con el volumen)
app.directorio.destino=${APP_DIRECTORIO_DESTINO}

# Logging agresivo para debug
logging.level.root=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.web=DEBUG
logging.level.ar.edu.utn.frba.dds=DEBUG

# Evitar errores de inicio
spring.main.banner-mode=off
server.error.include-message=always
server.error.include-stacktrace=always

# Configuración Datadog

## Exponer endpoints de Actuator (para health y metrics)
management.endpoints.web.exposure.include=health,info,metrics

# API key de Datadog (inyectada por env var)
management.datadog.metrics.export.api-key=${DD_API_KEY}

# Site de Datadog (porque estás en us3)
management.datadog.metrics.export.uri=https://api.us3.datadoghq.com

# Enviar métricas cada 10s
management.datadog.metrics.export.enabled=true
management.datadog.metrics.export.step=10s

# Tags globales para todas las métricas
management.metrics.tags.env=${DD_ENV}
management.metrics.tags.service=${SPRING_APPLICATION_NAME}
management.metrics.tags.version=${DD_VERSION}