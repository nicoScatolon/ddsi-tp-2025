<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | MetaMapa</title>
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="images/icon.ico">

    <!-- Styles -->
    <link rel="stylesheet" href="styles/styles.css"> 
    <link rel="stylesheet" href="styles/form-style.css">

    <script src="js/navbar.js" defer></script>
</head>
<body>
<!-- NAVBAR DESKTOP -->
  <header class="desktop-nav">
    <nav>
      <div class="brand">
        <a href="index.html">
          <img src="images/icon.ico" alt="MetaMapa Logo">
          <span class="site-name">MetaMapa</span>
        </a>
      </div>

      <ul class="nav-links">
        <li><a href="create.html" class="btn btn-primary">+ Create</a></li>
        <li><a href="explore.html">Explore</a></li>
        <li><a href="map.html">Map</a></li>
        <li><a href="collections.html">Collections</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>

      <!-- Right-side area: authButtons (guest) OR desktop single user/admin button -->
      <div class="right-controls" style="display:flex; align-items:center; gap:8px;">
        <!-- auth buttons for guest -->
        <div id="authButtons" class="login">
          <a href="login.html" class="btn btn-secondary" id="desktopLoginBtn">Log in</a>
          <a href="signup.html" class="btn btn-secondary" id="desktopSignupBtn">Sign up</a>
        </div>

        <!-- desktop single button container (hidden for guest) -->
        <div id="desktopUserContainer" style="display:none; position:relative;">
          <button id="desktopUserBtn" class="btn btn-secondary" type="button" aria-haspopup="true" aria-expanded="false">
            <span id="desktopUserLabel">User</span>
            <img id="desktopAvatar" src="images/user.ico" alt="avatar" class="nav-avatar" style="vertical-align:middle; margin-left:8px;">
          </button>

          <!-- dropdown on desktop -->
          <div id="desktopUserDropdown"
               style="position:absolute; right:0; top:calc(100% + 8px); display:none; min-width:220px;
                      background:var(--color-primary); border-radius:8px; padding:6px 0; z-index:4000; box-shadow:0 6px 14px rgba(0,0,0,0.18);">
            <!-- items built by JS -->
          </div>
        </div>
      </div>
    </nav>
  </header>

  <!-- NAVBAR MOBILE -->
  <nav class="mobile-nav">
    <a href="explore.html">
      <img src="images/explore.ico" alt="Explore Icon"><span>Explore</span>
    </a>
    <a href="map.html">
      <img src="images/map.ico" alt="Map Icon"><span>Map</span>
    </a>
    <a href="create.html" class="create-btn">
      <img src="images/create.ico" alt="Create Icon"><span>Create</span>
    </a>
    <a href="collections.html">
      <img src="images/folder.ico" alt="Collections Icon"><span>Collections</span>
    </a>

    <!-- Perfil con dropdown (mobile) - mantenido tal cual -->
    <div id="mobileProfileMenu" class="mobile-profile">
      <img src="images/user.ico" alt="Perfil Icon"><span>Perfil</span>
      <div id="mobileProfileDropdown" class="profile-dropdown" style="display:none;">
        <!-- JS llena esto -->
      </div>
    </div>
  </nav>

  <!-- NAVBAR ZOOM (Burger) -->
  <nav class="zoom-nav">
    <div class="burger" id="burgerBtn">&#9776;</div>

    <div class="sidebar" id="sidebar">
      <a href="create.html" class="btn-secondary-custom">Create</a>
      <a href="explore.html">Explore</a>
      <a href="map.html">Map</a>
      <a href="collections.html">Collections</a>
      <a href="about.html">About Us</a>

      <!-- aquí el contenedor para el control único en la sidebar;
           JS rellenará auth o el botón user/admin + submenu -->
      <div id="sidebarUserArea" style="margin-top:8px;"></div>
    </div>
  </nav>

    <main class="signup-section">
        <form class="signup-form">
            <h2>Create Account</h2>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>
            
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="********" required>

            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="********" required>
            
            <button type="submit" class="btn btn-primary">Sign Up</button>
            
            <p>Already have an account? <a href="login.html">Log in</a></p>
        </form>
    </main>

   
</body>
 <footer>
      <p>© 2025 MetaMapa - Todos los derechos reservados</p>
      <a href="legal-privacidad.html">Información legal | Privacidad</a>
  </footer>
</html>
