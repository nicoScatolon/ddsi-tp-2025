<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | MetaMapa</title>
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="images/icon.ico">

    <!-- Styles -->
    <link rel="stylesheet" href="styles/styles.css"> 
    <link rel="stylesheet" href="styles/form-style.css">

    <script src="js/navbar.js" defer></script>
</head>
<body>
    <!-- NAVBAR DESKTOP -->
  <header class="desktop-nav">
    <nav>
      <div class="brand">
        <a href="index.html">
          <img src="images/icon.ico" alt="MetaMapa Logo">
          <span class="site-name">MetaMapa</span>
        </a>
      </div>
      <ul class="nav-links">
        <li><a href="create.html" class="btn btn-primary">+ Create</a></li>
        <li><a href="explore.html">Explore</a></li>
        <li><a href="map.html">Map</a></li>
        <li><a href="collections.html">Collections</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>
      <div class="login">
        <a href="login.html" class="btn btn-secondary">Log in</a>
        <a href="signup.html" class="btn btn-secondary">Sign up</a>
      </div>
    </nav>
  </header>

  <!-- NAVBAR MOBILE -->
  <nav class="mobile-nav">
    <a href="explore.html"><span>Explore</span></a>
    <a href="map.html"><span>Map</span></a>
    <a href="create.html" class="create-btn">+</a>
    <a href="collections.html"><span>Collections</span></a>
    <a href="login.html"><span>Perfil</span></a>
  </nav>

  <!-- NAVBAR ZOOM (Burger) -->
  <nav class="zoom-nav">
    <div class="burger" id="burgerBtn">&#9776;</div>
    <div class="sidebar" id="sidebar">
        <a href="create.html" class="btn-secondary-custom">Create</a>
        <a href="explore.html">Explore</a>
        <a href="map.html">Map</a>
        <a href="collections.html">Collections</a>
        <a href="about.html">About Us</a>
      <a href="login.html" class="btn-secondary-custom">Log in</a>
      <a href="signup.html" class="btn-secondary-custom">Sign up</a>
    </div>
  </nav>

    <main class="signup-section">
        <form class="signup-form">
            <h2>Create Account</h2>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>
            
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="********" required>

            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="********" required>
            
            <button type="submit" class="btn btn-primary">Sign Up</button>
            
            <p>Already have an account? <a href="login.html">Log in</a></p>
        </form>
    </main>
</body>
</html>
