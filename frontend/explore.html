<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore - MetaMapa</title>

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="images/icon.ico">

  <!-- CSS Global -->
  <link rel="stylesheet" href="styles/styles.css">

  <!-- CSS Explore -->
  <link rel="stylesheet" href="styles/explore-style.css">

  <!-- JS con hechos dinámicos -->
  <script src="js/explore.js" defer></script>
</head>
<body>
  <!-- HEADER -->
  <header>
    <nav>
      <div class="brand">
        <a href="index.html">
          <img src="images/icon.ico" alt="MetaMapa Logo">
          <span class="site-name">MetaMapa</span>
        </a>
      </div>
      <ul class="nav-links">
        <li><a href="create.html" class="btn btn-primary">+ Create</a></li>
        <li><a href="explore.html" class="active">Explore</a></li>
        <li><a href="map.html">Map</a></li>
        <li><a href="collections.html">Collections</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>
      <div class="login">
        <a href="login.html" class="btn btn-secondary">Log in</a>
        <a href="signup.html" class="btn btn-secondary">Sign up</a>
      </div>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main>
    <section id="explore">
      <div class="explore-layout">
        
        <!-- BOX FILTROS -->
        <aside class="filter-box">
          <h2>Filtros</h2>
          <div class="filter-group">
            <label for="categoria">Categoría</label>
            <select id="categoria">
              <option value="">Todas</option>
              <option value="historia">Historia</option>
              <option value="cultura">Cultura</option>
              <option value="evento">Evento</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="etiquetas">Etiquetas</label>
            <input type="text" id="etiquetas" placeholder="Buscar etiqueta...">
          </div>
          <div class="filter-group">
            <label for="fecha">Fecha</label>
            <input type="date" id="fecha">
          </div>
          <button class="btn-filter">Aplicar filtros</button>
        </aside>

        <!-- CARDS -->
        <div id="hechos-container" class="cards-container">
          <!-- Las cards se cargan dinámicamente desde explore.js -->
        </div>
      </div>
    </section>
  </main>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2 id="modal-title"></h2>
      <img id="modal-img" src="" alt="">
      <p class="meta" id="modal-meta"></p>
      <p id="modal-description"></p>
    </div>
  </div>

  
</body>
</html>
