<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore | MetaMapa</title>

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="images/icon.ico">

  <!-- CSS Global -->
  <link rel="stylesheet" href="styles/styles.css">

  <!-- CSS Explore -->
  <link rel="stylesheet" href="styles/explore-style.css">

  <!-- JS con hechos dinámicos -->
  <script src="js/hechos.js" defer></script>
  <script src="js/explore.js" defer></script>
  <script src="js/navbar.js" defer></script>
</head>
<body>
  <!-- NAVBAR DESKTOP -->
  <header class="desktop-nav">
    <nav>
      <div class="brand">
        <a href="index.html">
          <img src="images/icon.ico" alt="MetaMapa Logo">
          <span class="site-name">MetaMapa</span>
        </a>
      </div>
      <ul class="nav-links">
        <li><a href="create.html" class="btn btn-primary">+ Create</a></li>
        <li><a href="explore.html">Explore</a></li>
        <li><a href="map.html">Map</a></li>
        <li><a href="collections.html">Collections</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>
      <div class="login">
        <a href="login.html" class="btn btn-secondary">Log in</a>
        <a href="signup.html" class="btn btn-secondary">Sign up</a>
      </div>
    </nav>
  </header>

  <!-- NAVBAR MOBILE -->
  <nav class="mobile-nav">
    <a href="explore.html"><span>Explore</span></a>
    <a href="map.html"><span>Map</span></a>
    <a href="create.html" class="create-btn">+</a>
    <a href="collections.html"><span>Collections</span></a>
    <a href="login.html"><span>Perfil</span></a>
  </nav>

  <!-- NAVBAR ZOOM (Burger) -->
  <nav class="zoom-nav">
    <div class="burger" id="burgerBtn">&#9776;</div>
    <div class="sidebar" id="sidebar">
        <a href="create.html" class="btn-secondary-custom">Create</a>
        <a href="explore.html">Explore</a>
        <a href="map.html">Map</a>
        <a href="collections.html">Collections</a>
        <a href="about.html">About Us</a>
      <a href="login.html" class="btn-secondary-custom">Log in</a>
      <a href="signup.html" class="btn-secondary-custom">Sign up</a>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main>
    <section id="explore">
      <div class="explore-layout">
        <!-- BOX FILTROS -->
        <aside class="filter-box">
          <h2>Filtros</h2>
          <div class="filter-group">
            <label for="categoria">Categoría</label>
            <select id="categoria">
              <option value="">Todas</option>
              <option value="historia">Historia</option>
              <option value="cultura">Cultura</option>
              <option value="evento">Evento</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="etiquetas">Etiquetas</label>
            <input type="text" id="etiquetas" placeholder="Buscar etiqueta...">
          </div>
          <div class="filter-group">
            <label for="fecha">Fecha</label>
            <input type="date" id="fecha">
          </div>
          <button class="btn-filter">Aplicar filtros</button>
        </aside>

        <!-- CARDS -->
        <div id="hechos-container" class="cards-container">
          <!-- Las cards se cargan dinámicamente desde explore.js -->
        </div>
      </div>
    </section>
  </main>
</body>
</html>
