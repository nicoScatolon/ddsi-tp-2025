<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create | MetaMapa</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="images/icon.ico">

    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/create-style.css">

    <script src="js/navbar.js" defer></script>
</head>
<body>
  <!-- NAVBAR DESKTOP -->
  <header class="desktop-nav">
    <nav>
      <div class="brand">
        <a href="index.html">
          <img src="images/icon.ico" alt="MetaMapa Logo">
          <span class="site-name">MetaMapa</span>
        </a>
      </div>

      <ul class="nav-links">
        <li><a href="create.html" class="btn btn-primary">+ Create</a></li>
        <li><a href="explore.html">Explore</a></li>
        <li><a href="map.html">Map</a></li>
        <li><a href="collections.html">Collections</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>

      <!-- Right-side area: authButtons (guest) OR desktop single user/admin button -->
      <div class="right-controls" style="display:flex; align-items:center; gap:8px;">
        <!-- auth buttons for guest -->
        <div id="authButtons" class="login">
          <a href="login.html" class="btn btn-secondary" id="desktopLoginBtn">Log in</a>
          <a href="signup.html" class="btn btn-secondary" id="desktopSignupBtn">Sign up</a>
        </div>

        <!-- desktop single button container (hidden for guest) -->
        <div id="desktopUserContainer" style="display:none; position:relative;">
          <button id="desktopUserBtn" class="btn btn-secondary" type="button" aria-haspopup="true" aria-expanded="false">
            <span id="desktopUserLabel">User</span>
            <img id="desktopAvatar" src="images/user.ico" alt="avatar" class="nav-avatar" style="vertical-align:middle; margin-left:8px;">
          </button>

          <!-- dropdown on desktop -->
          <div id="desktopUserDropdown"
               style="position:absolute; right:0; top:calc(100% + 8px); display:none; min-width:220px;
                      background:var(--color-primary); border-radius:8px; padding:6px 0; z-index:4000; box-shadow:0 6px 14px rgba(0,0,0,0.18);">
            <!-- items built by JS -->
          </div>
        </div>
      </div>
    </nav>
  </header>

  <!-- NAVBAR MOBILE -->
  <nav class="mobile-nav">
    <a href="explore.html">
      <img src="images/explore.ico" alt="Explore Icon"><span>Explore</span>
    </a>
    <a href="map.html">
      <img src="images/map.ico" alt="Map Icon"><span>Map</span>
    </a>
    <a href="create.html" class="create-btn">
      <img src="images/create.ico" alt="Create Icon"><span>Create</span>
    </a>
    <a href="collections.html">
      <img src="images/folder.ico" alt="Collections Icon"><span>Collections</span>
    </a>

    <!-- Perfil con dropdown (mobile) - mantenido tal cual -->
    <div id="mobileProfileMenu" class="mobile-profile">
      <img src="images/user.ico" alt="Perfil Icon"><span>Perfil</span>
      <div id="mobileProfileDropdown" class="profile-dropdown" style="display:none;">
        <!-- JS llena esto -->
      </div>
    </div>
  </nav>

  <!-- NAVBAR ZOOM (Burger) -->
  <nav class="zoom-nav">
    <div class="burger" id="burgerBtn">&#9776;</div>

    <div class="sidebar" id="sidebar">
      <a href="create.html" class="btn-secondary-custom">Create</a>
      <a href="explore.html">Explore</a>
      <a href="map.html">Map</a>
      <a href="collections.html">Collections</a>
      <a href="about.html">About Us</a>

      <!-- aquí el contenedor para el control único en la sidebar;
           JS rellenará auth o el botón user/admin + submenu -->
      <div id="sidebarUserArea" style="margin-top:8px;"></div>
    </div>
  </nav>

    <section class="form-container">
      <h1>Crear Hecho</h1>
      <form id="hechoForm">
        <!-- Datos básicos -->
        <div class="form-group">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" name="titulo" placeholder="Incendio Forestal" required>
        </div>

        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" name="descripcion" rows="3" required placeholder="Escribí aquí la descripción..."></textarea>
        </div>

        <div class="form-group">
            <label for="categoria">Categoría</label>
            <div class="categoria-wrapper">
                <select id="categoria" name="categoria" required>
                    <option value="" disabled selected>Seleccione una categoría</option>
                    <option value="Ambiental">Ambiental</option>
                    <option value="Social">Social</option>
                    <option value="Política">Política</option>
                    <option value="other">Otra...</option>
                </select>
                <input type="text" id="categoriaNueva" name="categoriaNueva" placeholder="Escriba nueva categoría" style="display:none; margin-top:0.5rem;">
            </div>
        </div>

        <!-- Fecha -->
        <div class="form-group">
          <label for="fechaDeOcurrencia">Fecha de Ocurrencia</label>
          <input type="date" id="fechaDeOcurrencia" name="fechaDeOcurrencia" required>
        </div>

        <!-- Ubicación -->
        <h2>Ubicación</h2>
        <div class="form-group">
          <label for="tipoUbicacion">Tipo de ubicación:</label>
          <select id="tipoUbicacion" name="tipoUbicacion" required>
            <option value="">-- Seleccione --</option>
            <option value="direccion">Provincia, Localidad, Calle y Número</option>
            <option value="coordenadas">Latitud y Longitud</option>
            <option value="puntoInteres">Punto de Interés Conocido</option>
          </select>
        </div>

        <!-- Dirección -->
        <div class="form-group">
          <label for="provincia">Provincia</label>
          <input type="text" id="provincia" name="provincia" placeholder="Ej: Buenos Aires">
        </div>
        <div class="form-group">
          <label for="localidad">Localidad</label>
          <input type="text" id="localidad" name="localidad" placeholder="Ej: La Plata">
        </div>
        <div class="form-group">
          <label for="calle">Calle</label>
          <input type="text" id="calle" name="calle" placeholder="Ej: 7">
        </div>
        <div class="form-group">
          <label for="numero">Número</label>
          <input type="text" id="numero" name="numero" placeholder="Ej: 1234">
        </div>

        <!-- Coordenadas -->
        <div class="form-group">
          <label for="latitudUbicacion">Latitud</label>
          <input type="number" step="any" id="latitudUbicacion" name="latitudUbicacion" placeholder="10.4341607196">
        </div>
        <div class="form-group">
          <label for="longitudUbicacion">Longitud</label>
          <input type="number" step="any" id="longitudUbicacion" name="longitudUbicacion" placeholder="-66.9756333673">
        </div>

        <!-- Punto de interés -->
        <div class="form-group">
          <label for="puntoInteres">Punto de Interés</label>
          <input type="text" id="puntoInteres" name="puntoInteres" placeholder="Ej: Parque Centenario">
        </div>

        

        <!-- Multimedia -->
        <h2>Contenido Multimedia</h2>
        <div class="form-group">
          <label for="contenidoMultimedia">Subir archivo</label>
          <input type="file" id="contenidoMultimedia" name="contenidoMultimedia" accept="image/*,video/*">
        </div>

        <div class="form-group checkbox">
          <input type="checkbox" id="esAnonimo" name="esAnonimo">
          <label for="esAnonimo">Publicar como anónimo</label>
        </div>

        <!-- Botones -->
        <div class="form-actions">
          <button type="submit" class="btn-local-primary">Guardar</button>
          <button type="reset" class="btn-local-secondary">Cancelar</button>
        </div>
      </form>
    </section>
    <br>
    <!-- JS -->
    <script src="js/form.js"></script>
</body>
</html>
