<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mis Hechos | MetaMapa</title>

  <!-- Fuente y estilos base -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">                 <!-- CSS global existente -->
  <link rel="stylesheet" href="styles/mis-hechos-style.css">       <!-- nuevo CSS compacto -->

  <link rel="icon" type="image/x-icon" href="images/icon.ico">
</head>
<body>
  <!-- NAVBAR DESKTOP (igual a otras páginas) -->
  <header class="desktop-nav">
    <nav>
      <div class="brand">
        <a href="index.html">
          <img src="images/icon.ico" alt="MetaMapa Logo">
          <span class="site-name">MetaMapa</span>
        </a>
      </div>

      <ul class="nav-links">
        <li><a href="create.html" class="btn btn-primary">+ Create</a></li>
        <li><a href="explore.html">Explore</a></li>
        <li><a href="map.html">Map</a></li>
        <li><a href="collections.html">Collections</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>

      <div class="right-controls" style="display:flex; align-items:center; gap:8px;">
        <div id="authButtons" class="login">
          <a href="login.html" class="btn btn-secondary" id="desktopLoginBtn">Log in</a>
          <a href="signup.html" class="btn btn-secondary" id="desktopSignupBtn">Sign up</a>
        </div>

        <div id="desktopUserContainer" style="display:none; position:relative;">
          <button id="desktopUserBtn" class="btn btn-secondary" type="button" aria-haspopup="true" aria-expanded="false">
            <span id="desktopUserLabel">User</span>
            <img id="desktopAvatar" src="images/user.ico" alt="avatar" class="nav-avatar" style="vertical-align:middle; margin-left:8px;">
          </button>

          <div id="desktopUserDropdown"
               style="position:absolute; right:0; top:calc(100% + 8px); display:none; min-width:220px;
                      background:var(--color-primary); border-radius:8px; padding:6px 0; z-index:4000; box-shadow:0 6px 14px rgba(0,0,0,0.18);">
            <!-- JS llena esto -->
          </div>
        </div>
      </div>
    </nav>
  </header>

  <!-- NAV MOBILE -->
  <nav class="mobile-nav" aria-hidden="true">
    <a href="explore.html"><img src="images/explore.ico" alt=""><span>Explore</span></a>
    <a href="map.html"><img src="images/map.ico" alt=""><span>Map</span></a>
    <a href="create.html" class="create-btn"><img src="images/create.ico" alt=""><span>Create</span></a>
    <a href="collections.html"><img src="images/folder.ico" alt=""><span>Collections</span></a>

    <div id="mobileProfileMenu" class="mobile-profile">
      <img src="images/user.ico" alt="Perfil Icon"><span>Perfil</span>
      <div id="mobileProfileDropdown" class="profile-dropdown" style="display:none;"></div>
    </div>
  </nav>

  <!-- ZOOM NAV / SIDEBAR (burger) -->
  <nav class="zoom-nav" aria-hidden="true">
    <div class="burger" id="burgerBtn">&#9776;</div>
    <div class="sidebar" id="sidebar">
      <a href="create.html" class="btn-secondary-custom">Create</a>
      <a href="explore.html">Explore</a>
      <a href="map.html">Map</a>
      <a href="collections.html">Collections</a>
      <a href="about.html">About Us</a>
      <div id="sidebarUserArea" style="margin-top:8px;"></div>
    </div>
  </nav>

  <!-- CONTENIDO PRINCIPAL COMPACTO -->
  <main class="mh-main">
    <section class="mh-container">
      <header class="mh-header">
        <h1>Mis Hechos</h1>

        <div class="mh-actions" role="search">
          <input id="mh-search" type="search" placeholder="Buscar por título o etiqueta…" aria-label="Buscar hechos">
          <select id="mh-category" aria-label="Filtrar por categoría">
            <option value="">Todas las categorías</option>
            <option value="Historia">Historia</option>
            <option value="Cultura">Cultura</option>
            <option value="Evento">Evento</option>
          </select>
          <button id="mh-filter" class="btn-ghost small">Aplicar</button>
        </div>
      </header>

      <div id="mh-list" class="mh-list" aria-live="polite">
        <!-- el JS rellenará filas aquí -->
      </div>

      <div id="mh-empty" class="mh-empty" hidden>
        <p>No tenés hechos aún. <a href="create.html">Creá el primero</a>.</p>
      </div>
    </section>
  </main>

  

  <!-- SCRIPTS: usa tu listado HECHOS y el script compacto -->
  <script src="js/hechos.js" defer></script>        <!-- tu "DB" global -->
  <script src="js/mis-hechos.js" defer></script>   <!-- script que renderiza, editar/borrar -->
  <script src="js/navbar.js" defer></script>       <!-- tu navbar existente -->
</body>

 <footer>
      <p>© 2025 MetaMapa - Todos los derechos reservados</p>
      <a href="legal-privacidad.html">Información legal | Privacidad</a>
  </footer>
</html>
