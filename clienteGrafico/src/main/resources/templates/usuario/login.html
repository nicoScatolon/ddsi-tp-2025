<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/form :: html}">

<div th:fragment="formContent">
    <div class="form-header">
        <div class="form-icon">
            <i class="fas fa-sign-in-alt"></i>
        </div>
        <h1>¡Bienvenido de vuelta!</h1>
        <p>Inicia sesión con tu cuenta de MetaMapa</p>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}">Credenciales Invalidas</span>
    </div>


    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">
                <i class="fas fa-user"></i>
                Email o Usuario
            </label>
            <input type="text" id="username" name="username" placeholder="tu@ejemplo.com o tu usuario" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">
                <i class="fas fa-lock"></i>
                Contraseña
            </label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-arrow-right me-2"></i>
            Iniciar Sesión
        </button>
    </form>

    <div class="form-footer">
        <p>¿Todavía no tenés cuenta? <a th:href="@{/signup}">¡Registrate ahora!</a></p>
    </div>
</div>

</html>
