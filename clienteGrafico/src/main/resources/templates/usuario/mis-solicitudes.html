<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html}">

<th:block th:fragment="cssExtra">
    <link rel="stylesheet" th:href="@{/css/usuario/mis-hechos.css}">
</th:block>

<div th:fragment="contenido">
    <div class="mh-main">
        <section class="mh-container">
            <header class="mh-header">
                <h1>Mis Solicitudes de Eliminación</h1>
            </header>

            <!-- SECCIÓN CONTENEDORA DE SOLICITUDES -->
            <section class="mh-hechos-section">
                <!-- Lista de solicitudes -->
                <div id="mh-list" class="mh-list" aria-live="polite">
                    <!-- Iteramos sobre cada solicitud -->
                    <div th:each="solicitud : ${solicitudes}" class="mh-card-wrapper">
                        <div class="mh-card">
                            <div class="mh-info">
                                <!-- Título del hecho -->
                                <div class="mh-title-row">
                                    <h3 class="mh-title" th:text="${solicitud.hecho.titulo != null ? solicitud.hecho.titulo : 'Hecho Desconocido'}">
                                        Título del hecho
                                    </h3>
                                </div>

                                <!-- Metadata -->
                                <div class="mh-meta">
                  <span class="mh-meta-item">
                    <i class="fas fa-calendar-plus"></i>
                    <strong>Fecha de solicitud:</strong>
                    <span th:text="${#temporals.format(solicitud.fechaCreacion, 'dd/MM/yyyy')} + ' - ' + ${#temporals.format(solicitud.fechaCreacion, 'HH:mm')}">
                      Fecha
                    </span>
                  </span>
                                </div>
                            </div>

                            <!-- Botones de acción -->
                            <div class="mh-actions">
                                <a th:href="@{'/hechos/' + ${solicitud.hecho.id}}" class="btn btn-view">
                                    <i class="fas fa-eye"></i> Ver Hecho
                                </a>
                            </div>
                        </div>

                        <!-- Razón de eliminación -->
                        <div class="mh-sugerencia solicitud-razon">
                            <strong>
                                <i class="fas fa-comment-dots"></i>
                                Razón de la solicitud
                            </strong>
                            <p th:text="${solicitud.razonDeEliminacion}">Razón de eliminación</p>
                        </div>
                    </div>
                </div>

                <!-- Mensaje cuando no hay solicitudes -->
                <div id="mh-empty" class="mh-empty" th:if="${solicitudes == null or #lists.isEmpty(solicitudes)}">
                    <p>No tenés solicitudes realizadas aún.</p>
                </div>
            </section>
        </section>
    </div>
</div>

<th:block th:fragment="jsExtra">
</th:block>

</html>
