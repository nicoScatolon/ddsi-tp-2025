<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/form :: html}">

<div th:fragment="formContent">
    <div class="form-header">
        <div class="form-icon">
            <i class="fas fa-user-plus"></i>
        </div>
        <h1>Crear Cuenta</h1>
        <p>¡Unite a MetaMapa ahora!</p>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}">
        <i class="fas fa-exclamation-circle me-2"></i>
        Error message
    </div>

    <form th:action="@{/signup}" th:object="${request}" method="post" class="compact-form">
        <div class="form-row">
            <div class="form-group">
                <label for="firstName">
                    <i class="fas fa-user"></i>
                    Nombre
                </label>
                <input type="text" id="firstName" th:field="*{nombre}" placeholder="Juan" required>
            </div>

            <div class="form-group">
                <label for="lastName">
                    <i class="fas fa-user"></i>
                    Apellido
                </label>
                <input type="text" id="lastName" th:field="*{apellido}" placeholder="Pérez" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-at"></i>
                    Usuario
                </label>
                <input type="text" id="username" th:field="*{username}" placeholder="jperez" required>
            </div>

            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i>
                    Email
                </label>
                <input type="email" id="email" th:field="*{email}" placeholder="tu@ejemplo.com" required>
            </div>
        </div>

        <div class="form-group">
            <label for="fechaDeNacimiento">
                <i class="fas fa-calendar"></i>
                Fecha de Nacimiento
            </label>
            <input type="date" id="fechaDeNacimiento" th:field="*{fecha_nacimiento}" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i>
                    Contraseña
                </label>
                <input type="password" id="password" th:field="*{password}" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">
                    <i class="fas fa-lock"></i>
                    Confirmar
                </label>
                <input type="password" id="confirm-password" th:field="*{confirmPassword}" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-check-circle me-2"></i>
            Crear Cuenta
        </button>
    </form>

    <div class="form-footer">
        <p>¿Ya tenés cuenta? <a th:href="@{/login}">Iniciá sesión</a></p>
    </div>
</div>

</html>
