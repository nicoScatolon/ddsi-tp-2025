<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html}">

<div th:fragment="contenido">

    <th:block th:fragment="cssExtra">
        <link rel="stylesheet" th:href="@{/css/colecciones/coleccionesExplore.css}">
    </th:block>

    <section id="collections">
        <h1>Colecciones</h1>
        <div class="explore-layout">
            <div class="filter-bar">
                <label for="filtro-colecciones">Filtrar por Consenso: </label>
                <select id="filtro-colecciones">
                    <option value="all">Ninguno</option>
                    <option value="Concenso Absoluto">Absoluto</option>
                    <option value="Mayoria Simple">Mayoría Simple</option>
                    <option value="Multiple Mencion">Múltiple Mención</option>
                </select>
            </div>

            <div id="collections-container" class="cards-container">
                <div th:each="coleccion : ${colecciones}" class="card collection-card">

                    <!-- Área clickeable que lleva al detalle -->
                    <a th:href="@{/colecciones/{handle}(handle=${coleccion.handle})}" class="card-link">
                        <div class="card-fallback"
                             style="background:#2F60F4; display:flex; justify-content:center; align-items:center; height:120px;">
                            <span style="color:#fff; font-weight:700; font-size:1.4rem;"
                                  th:text="${#strings.substring(coleccion.titulo, 0, 1)}"> A
                            </span>
                        </div>

                        <!-- Título -->
                        <div class="card-title" th:text="${coleccion.titulo}">Título de la colección</div>

                        <!-- Descripción -->
                        <div class="card-description">
                            <p th:text="${#strings.abbreviate(coleccion.descripcion, 140)}">
                                Breve descripción de la colección...
                            </p>
                        </div>
                    </a>

                    <!-- Acciones FUERA del link -->
                    <div th:if="${rol == 2}" class="card-actions">
                        <!-- Editar: redirige al controlador -->
                        <a th:href="@{/colecciones/{handle}/editar(handle=${coleccion.handle})}" class="btn-action btn-edit">
                            Editar
                        </a>

                        <!-- Eliminar: form POST con método DELETE -->
                        <form th:action="@{/colecciones/{handle}(handle=${coleccion.handle})}" method="post" class="inline-form"
                              onsubmit="return confirm('¿Seguro que querés eliminar esta colección?');">
                            <input type="hidden" name="_method" value="delete" />
                            <button type="submit" class="btn-action btn-delete">Eliminar</button>
                        </form>
                    </div>
                </div>
            </div>

            <div id="pagination-controls" style="display:flex; justify-content:center; align-items:center; gap:12px; margin-top:12px;">

                <!-- Botón Anterior -->
                <a class="pagination-arrow"
                   th:classappend="${paginaActual == 0} ? ' disabled' : ''"
                   th:onclick="${paginaActual == 0} ? 'return false;' : ''"
                   th:href="@{/colecciones(page=${paginaActual - 1})}">
                    ◀
                </a>

                <!-- Número de página actual -->
                <div class="pagination-page-number" th:text="${paginaActual+1}"> Numero Pagina </div>

                <!-- Botón Siguiente -->
                <a class="pagination-arrow"
                   th:classappend="${colecciones.size() < 20} ? ' disabled' : ''"
                   th:onclick="${colecciones.size() < 20} ? 'return false;' : ''"
                   th:href="@{/colecciones(page=${paginaActual + 1})}">
                    ▶
                </a>
            </div>

        </div>

    </section>
    <a href="/colecciones/create" class="fab-create" aria-label="Crear colección">
        <i class="fas fa-plus"></i>
    </a>
</div>
<th:block th:fragment="jsExtra">
    <script>
        (function addFavicon() {
            const existing = document.querySelector('link[rel="icon"]');
            if (existing) existing.href = "icon.ico";
            else {
                const link = document.createElement("link");
                link.rel = "icon";
                link.href = "icon.ico";
                document.head.appendChild(link);
            }
        })();

    </script>
</th:block>

</html>
