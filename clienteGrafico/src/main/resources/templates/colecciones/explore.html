<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: html}">

<div th:fragment="contenido">

    <th:block th:fragment="cssExtra">
        <link rel="stylesheet" th:href="@{/css/colecciones/coleccionesExplore.css}">
    </th:block>

    <section id="collections">
        <!-- Header con título y filtro -->
        <div class="collections-header">
            <h1>Colecciones</h1>
            <div class="filter-bar">
                <label for="filtro-colecciones">
                    <i class="fas fa-filter"></i>
                    Consenso:
                </label>
                <select id="filtro-colecciones">
                    <option value="all">Todos</option>
                    <option value="Concenso Absoluto">Absoluto</option>
                    <option value="Mayoria Simple">Mayoría Simple</option>
                    <option value="Multiple Mencion">Múltiple Mención</option>
                </select>
            </div>
        </div>

        <!-- Grid de colecciones -->
        <div id="collections-container" class="cards-container">
            <div th:each="coleccion : ${colecciones}" class="card collection-card">

                <!-- Área clickeable que lleva al detalle -->
                <a th:href="@{/colecciones/{handle}(handle=${coleccion.handle})}" class="card-link">

                    <!-- Imagen/Fallback con gradiente -->
                    <div class="card-image-wrapper">
                        <div class="card-fallback">
                            <span class="card-initial" th:text="${#strings.substring(coleccion.titulo, 0, 1)}">A</span>
                        </div>
                    </div>

                    <!-- Contenido de la card -->
                    <div class="card-content">
                        <!-- Título -->
                        <h3 class="card-title" th:text="${coleccion.titulo}">Título de la colección</h3>

                        <!-- Descripción -->
                        <p class="card-description" th:text="${#strings.abbreviate(coleccion.descripcion, 160)}">
                            Breve descripción de la colección que puede extenderse un poco más...
                        </p>
                    </div>
                </a>
            </div>
        </div>

        <!-- Paginación -->
        <div id="pagination-controls">
            <!-- Botón Anterior -->
            <a class="pagination-arrow"
               th:classappend="${paginaActual == 0} ? ' disabled' : ''"
               th:onclick="${paginaActual == 0} ? 'return false;' : ''"
               th:href="@{/colecciones(page=${paginaActual - 1})}">
                <i class="fas fa-chevron-left"></i>
            </a>

            <!-- Número de página actual -->
            <div class="pagination-page-number">
                <span>Página <strong th:text="${paginaActual+1}">1</strong></span>
            </div>

            <!-- Botón Siguiente -->
            <a class="pagination-arrow"
               th:classappend="${colecciones.size() < 20} ? ' disabled' : ''"
               th:onclick="${colecciones.size() < 20} ? 'return false;' : ''"
               th:href="@{/colecciones(page=${paginaActual + 1})}">
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>

    </section>

    <!-- Botón flotante para crear colección -->
    <div sec:authorize="hasAnyRole('ADMIN','ADMINSUPERIOR')">
        <a href="/colecciones/create" class="fab-create" aria-label="Crear colección">
            <i class="fas fa-plus"></i>
        </a>
    </div>

</div>

<th:block th:fragment="jsExtra">
    <script>
        (function addFavicon() {
            const existing = document.querySelector('link[rel="icon"]');
            if (existing) existing.href = "icon.ico";
            else {
                const link = document.createElement("link");
                link.rel = "icon";
                link.href = "icon.ico";
                document.head.appendChild(link);
            }
        })();
    </script>
</th:block>

</html>
