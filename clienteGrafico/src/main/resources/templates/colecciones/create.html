<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html}">
<th:block th:fragment="cssExtra">
    <link rel="stylesheet" th:href="@{/css/colecciones/form.css}">
</th:block>

<div th:fragment="contenido">
    <section id="create-collection">
        <section class="card">

            <h1 th:text="${titulo}"></h1>

            <!-- Div para pasar datos al JS -->
            <div id="coleccionData"
                 th:data-es-nueva="${nueva}"
                 th:data-criterios-json="${!nueva && coleccionDTO.listaCriterios != null ? coleccionDTO.listaCriteriosJson : '[]'}"
                 style="display:none;"></div>

            <form th:action="${actionUrl}" th:object="${coleccionDTO}" method="post" id="collectionForm">

                <!-- Si NO es nueva, convertir POST en PUT -->
                <input th:if="${!nueva}" type="hidden" name="_method" value="put">

                <!-- Handle solo para edición -->
                <input th:if="${!nueva}" type="hidden" th:field="*{handle}">

                <div class="form-section">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" th:field="*{titulo}" placeholder="Incidentes de tráfico" required>
                </div>

                <div class="form-section">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" th:field="*{descripcion}" rows="3" required placeholder="Descripción breve de la colección"></textarea>
                </div>

                <div class="form-section">
                    <label>Fuentes</label>
                    <div class="fuentes-selector">
                        <div id="fuentesToggle" class="fuentes-toggle" role="button" aria-expanded="false">
                            <span>Seleccionar fuentes</span>
                            <span id="fuentesCount" class="badge">0</span>
                        </div>

                        <div id="fuentesPanel" class="fuentes-panel" aria-hidden="true" style="display:none;">
                            <ul>
                                <li th:each="fuente : ${fuentes}">
                                    <label>
                                        <input
                                                type="checkbox"
                                                class="fuente-checkbox"
                                                th:value="${fuente.fuenteId}"
                                                th:data-nombre="${fuente.nombre}"
                                                th:checked="${fuentesSeleccionadas != null && #lists.contains(fuentesSeleccionadas, fuente.fuenteId)}"
                                        />
                                        <span th:text="${fuente.nombre}">Fuente</span>
                                    </label>
                                </li>
                            </ul>
                        </div>

                        <div id="fuentesChips" class="fuentes-chips" aria-live="polite"></div>
                    </div>
                </div>

                <div class="form-section criterios-section">
                    <label>Criterios de Filtrado</label>

                    <!-- Grid de criterios disponibles -->
                    <div class="criterios-grid">
                        <div class="criterio-card" data-tipo="Titulo">
                            <i class="fas fa-heading"></i>
                            <span>Título</span>
                        </div>
                        <div class="criterio-card" data-tipo="Categoria">
                            <i class="fas fa-tag"></i>
                            <span>Categoría</span>
                        </div>
                        <div class="criterio-card" data-tipo="Etiqueta">
                            <i class="fas fa-tags"></i>
                            <span>Etiquetas</span>
                        </div>
                        <div class="criterio-card" data-tipo="Provincia">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>Provincia</span>
                        </div>
                        <div class="criterio-card" data-tipo="CargaEntreFechas">
                            <i class="fas fa-calendar-plus"></i>
                            <span>Carga</span>
                        </div>
                        <div class="criterio-card" data-tipo="OcurrenciaEntreFechas">
                            <i class="fas fa-calendar-check"></i>
                            <span>Ocurrencia</span>
                        </div>
                        <div class="criterio-card" data-tipo="ContenidoMultimedia">
                            <i class="fas fa-image"></i>
                            <span>Multimedia</span>
                        </div>
                    </div>

                    <!-- Templates ocultos -->
                    <div id="categoriaTemplate" style="display:none;">
                        <input type="text"
                               class="criterio-input"
                               placeholder="Escriba para buscar..."
                               list="listaCategorias"
                               autocomplete="off">
                        <datalist id="listaCategorias">
                            <option th:each="cat : ${categorias}" th:value="${cat}" th:text="${cat}"></option>
                        </datalist>
                    </div>

                    <div id="etiquetaTemplate" style="display:none;">
                        <div class="etiquetas-mini-panel">
                            <div class="etiquetas-toggle-mini" role="button">
                                <span>Seleccionar etiquetas</span>
                                <span class="etiquetas-count-mini badge">0</span>
                            </div>
                            <div class="etiquetas-panel-mini" style="display:none;">
                                <ul>
                                    <li th:each="et : ${etiquetas}">
                                        <label>
                                            <input type="checkbox"
                                                   class="etiqueta-checkbox"
                                                   th:value="${et}"
                                                   th:data-nombre="${et}">
                                            <span th:text="${et}">Etiqueta</span>
                                        </label>
                                    </li>
                                </ul>
                            </div>
                            <div class="etiquetas-chips-mini"></div>
                        </div>
                    </div>

                    <div id="provinciaTemplate" style="display:none;">
                        <input type="text"
                               class="criterio-input"
                               placeholder="Escriba para buscar..."
                               list="listaProvincias"
                               autocomplete="off">
                        <datalist id="listaProvincias">
                            <option th:each="prov : ${provincias}" th:value="${prov}" th:text="${prov}"></option>
                        </datalist>
                    </div>

                    <div id="multimediaTemplate" style="display:none;">
                        <div class="multimedia-buttons">
                            <button type="button" class="multimedia-btn" data-value="false">
                                <i class="fas fa-times-circle"></i>
                                <span>Sin multimedia</span>
                            </button>
                            <button type="button" class="multimedia-btn" data-value="true">
                                <i class="fas fa-check-circle"></i>
                                <span>Con multimedia</span>
                            </button>
                        </div>
                        <input type="hidden" class="criterio-multimedia-hidden">
                    </div>

                    <!-- Contenedor de criterios seleccionados -->
                    <div id="criteriosContainer" class="criterios-selected"></div>
                </div>

                <div class="form-section">
                    <label for="algoritmoConsensoTipo">Algoritmo de Consenso</label>
                    <select id="algoritmoConsensoTipo" th:field="*{algoritmoConsensoTipo}" class="form-select">
                        <option value="">Ninguno</option>
                        <option value="ABSOLUTO">Absoluto</option>
                        <option value="MAYORIASIMPLE">Mayoría simple</option>
                        <option value="MULTIPLEMENCION">Múltiple mención</option>
                    </select>
                </div>

                <div id="generatedHiddenFields" style="display:none;"></div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i th:class="${nueva} ? 'fas fa-save' : 'fas fa-sync'"></i>
                        <span th:text="${nueva ? 'Crear' : 'Actualizar'}">Crear</span>
                    </button>
                </div>
            </form>
        </section>
    </section>
</div>

<th:block th:fragment="jsExtra">
    <script th:src="@{/js/coleccion-form.js}"></script>
</th:block>
</html>
