<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' - MetaMapa'"></title>

    <!-- importar fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- importar estilos y layout-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- importar íconos-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/img/icon.ico">

    <!-- CSS base -->
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <!-- Css reemplazable -->
    <th:block th:replace="~{::cssExtra}"></th:block>

</head>
<body>
<!-- NAVBAR DESKTOP -->
<header class="desktop-nav">
    <nav>
        <div class="brand">
            <a th:href="@{/index}">
                <img src="/img/icon.ico" alt="MetaMapa Logo">
                <span class="site-name">MetaMapa</span>
            </a>
        </div>

        <ul class="nav-links">
            <li>
                <a href="/hechos/create" class="btn btn-primary">
                    <i class="fas fa-plus me-2"></i> Hecho
                </a>
            </li>
            <li><a href="/hechos">Explorar</a></li>
            <li><a href="/hechos/map">Mapa</a></li>
            <li><a href="/colecciones">Colecciones</a></li>
            <li><a href="/about">Nosotros</a></li>
        </ul>

        <div class="right-controls">

            <!-- Si el usuario NO está logueado - NUEVO DROPDOWN -->
            <div sec:authorize="!isAuthenticated()" id="desktopLoginContainer">
                <button id="desktopLoginBtn" class="btn btn-secondary" type="button" aria-haspopup="true" aria-expanded="false">
                    <i class="fas fa-user-circle"></i>
                    <span>Cuenta</span>
                    <i class="fas fa-chevron-down ms-1" style="font-size: 0.75rem;"></i>
                </button>

                <div id="desktopLoginDropdown">
                    <a th:href="@{/login}" class="dropdown-login-link">
                        <i class="fas fa-sign-in-alt"></i>
                        Ingresar
                    </a>
                    <a th:href="@{/signup}" class="dropdown-login-link">
                        <i class="fas fa-user-plus"></i>
                        Registrarse
                    </a>
                </div>
            </div>

            <!-- Si el usuario está logueado -->
            <div sec:authorize="isAuthenticated()" id="desktopUserContainer">
                <!-- Botón para Visualizador (no autenticado con cuenta) -->
                <button sec:authorize="hasRole('VISUALIZADOR')" id="desktopUserBtn" class="btn btn-user-visualizador" type="button" aria-haspopup="true" aria-expanded="false">
                    <i class="fas fa-eye"></i>
                    <span>Visualizador</span>
                </button>

                <!-- Botón para Contribuyente -->
                <button sec:authorize="hasRole('CONTRIBUYENTE')" id="desktopUserBtn" class="btn btn-user-contribuyente" type="button" aria-haspopup="true" aria-expanded="false">
                    <i class="fas fa-user"></i>
                    <span>Contribuyente</span>
                </button>

                <!-- Botón para Admin -->
                <button sec:authorize="hasRole('ADMIN')" id="desktopUserBtn" class="btn btn-user-admin" type="button" aria-haspopup="true" aria-expanded="false">
                    <i class="fas fa-user-cog"></i>
                    <span>Admin</span>
                </button>

                <!-- Botón para Admin Superior -->
                <button sec:authorize="hasRole('ADMINSUPERIOR')" id="desktopUserBtn" class="btn btn-user-adminsuperior" type="button" aria-haspopup="true" aria-expanded="false">
                    <i class="fas fa-crown"></i>
                    <span>Admin Superior</span>
                </button>

                <div id="desktopUserDropdown">
                    <!-- Opciones para ADMIN -->
                    <a sec:authorize="hasAnyRole('ADMIN','ADMINSUPERIOR')" th:href="@{/admin}" class="dropdown-admin">
                        Panel de administrador
                    </a>

                    <!-- Opciones para USER -->
                    <a sec:authorize="hasAnyRole('CONTRIBUYENTE','ADMIN','ADMINSUPERIOR')" th:href="@{/profile}" class="dropdown-link">
                        Mi Perfil
                    </a>
                    <a sec:authorize="hasAnyRole('CONTRIBUYENTE','ADMIN','ADMINSUPERIOR')" th:href="@{/mis-hechos}" class="dropdown-link">
                        Mis Hechos
                    </a>
                    <a sec:authorize="hasAnyRole('CONTRIBUYENTE','ADMIN','ADMINSUPERIOR')" th:href="@{/mis-solicitudes}" class="dropdown-link">
                        Mis Solicitudes
                    </a>

                    <!-- Logout -->
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="dropdown-logout">
                            Cerrar Sesión
                        </button>
                    </form>
                </div>
            </div>
        </div>



    </nav>
</header>

<!-- Contenido principal -->
<main class="container-fluid my-4 flex-grow-1">
    <div th:replace="~{${contenido} :: contenido}"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

<!-- Modal de Error -->
<div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title" id="errorModalLabel">
                    <i class="fas fa-exclamation-triangle me-2"></i>Error
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p th:text="${error}" id="errorMessage">Ha ocurrido un error.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 MetaMapa - Todos los derechos reservados</p>
    <a href="/legales">Información legal | Privacidad</a>
</footer>

<script th:src="@{/js/navbar.js}"></script>

<script th:if="${error != null}">
    document.addEventListener('DOMContentLoaded', function() {
        var errorModal = new bootstrap.Modal(document.getElementById('errorModal'));
        errorModal.show();
    });
</script>

<th:block th:replace="~{::jsExtra}"></th:block>
</html>
