<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="gestion-usuarios">
    <div class="usuarios-header">
        <p class="usuarios-description">Administra los usuarios del sistema y crea nuevos administradores</p>
        <button type="button" class="btn btn-primary btn-crear-admin" data-bs-toggle="modal" data-bs-target="#modalCrearAdmin">
            <i class="fas fa-user-plus me-2"></i>
            Crear Administrador
        </button>
    </div>

    <!-- Modal Crear Administrador -->
    <div class="modal fade" id="modalCrearAdmin" tabindex="-1" aria-labelledby="modalCrearAdminLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalCrearAdminLabel">
                        <i class="fas fa-user-shield me-2"></i>
                        Crear Nuevo Administrador
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <form th:action="@{/admin/crear-admin}" method="post">
                    <div class="modal-body">
                        <div class="row g-3">
                            <!-- Nombre -->
                            <div class="col-md-6">
                                <label for="nombre" class="form-label">
                                    <i class="fas fa-user me-1"></i>
                                    Nombre <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ej: Juan" required>
                            </div>

                            <!-- Apellido -->
                            <div class="col-md-6">
                                <label for="apellido" class="form-label">
                                    <i class="fas fa-user me-1"></i>
                                    Apellido <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="apellido" name="apellido" placeholder="Ej: Pérez" required>
                            </div>

                            <!-- Fecha de Nacimiento -->
                            <div class="col-md-12">
                                <label for="fecha_nacimiento" class="form-label">
                                    <i class="fas fa-calendar me-1"></i>
                                    Fecha de Nacimiento <span class="text-danger">*</span>
                                </label>
                                <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento" required>
                            </div>

                            <!-- Username -->
                            <div class="col-md-6">
                                <label for="username" class="form-label">
                                    <i class="fas fa-at me-1"></i>
                                    Nombre de Usuario <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="username" name="username" placeholder="Ej: jperez" required>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <label for="email" class="form-label">
                                    <i class="fas fa-envelope me-1"></i>
                                    Email <span class="text-danger">*</span>
                                </label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="Ej: jperez@ejemplo.com" required>
                            </div>

                            <!-- Password -->
                            <div class="col-md-6">
                                <label for="password" class="form-label">
                                    <i class="fas fa-lock me-1"></i>
                                    Contraseña <span class="text-danger">*</span>
                                </label>
                                <input type="password" class="form-control" id="password" name="password" placeholder="****">
                            </div>

                            <!-- Confirmar Password -->
                            <div class="col-md-6">
                                <label for="confirmPassword" class="form-label">
                                    <i class="fas fa-lock me-1"></i>
                                    Confirmar Contraseña <span class="text-danger">*</span>
                                </label>
                                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Repetir contraseña">
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fas fa-times me-2"></i>
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>
                            Crear Administrador
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</html>
