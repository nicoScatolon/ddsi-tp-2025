<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="gestion-hechos">
    <section id="hechos" class="content-section">
        <!-- Tabs para moderación -->
        <div class="moderation-panel">
            <div class="moderation-tabs" role="tablist">
                <button class="mod-tab" th:classappend="${estado == 'PENDIENTE'} ? ' active'"
                        th:href="@{/admin/hechos(estado='PENDIENTE')}">Peticiones — Pendientes</button>
                <button class="mod-tab" th:classappend="${estado == 'MODIFICADO'} ? ' active'"
                        th:href="@{/admin/hechos(estado='RECHAZADO')}">Peticiones — Rechazados</button>
            </div>

            <div id="moderacion-hechos" class="moderacion-container">
                <div th:if="${#lists.isEmpty(hechos)}">
                    <p>No hay hechos pendientes.</p>
                </div>

                <div th:each="hecho : ${hechos}" class="solicitud-card">
                    <div class="solicitud-info">
                        <span><strong>ID:</strong> <span th:text="${hecho.id}">1</span></span>
                        <span><strong>ID Usuario:</strong> <span th:text="${hecho.contribuyenteId}">999</span></span>
                        <span><strong>Fecha:</strong> <span th:text="${#temporals.format(hecho.fechaDeCarga, 'dd-MM-yyyy')}">2025-09-01</span></span>
                    </div>

                    <div class="solicitud-razon">
                        <strong>Título:</strong> <span th:text="${hecho.titulo}">Hecho ejemplo</span>
                    </div>

                    <div class="solicitud-actions-row">
                        <a th:href="@{'/hechos/fuenteDinamica/' + ${hecho.id}}" class="btn">Ver Detalle</a>
                        <div class="solicitud-actions">
                            <form th:action="@{/admin/hechos}" method="post">
                                <input type="hidden" name="idHecho" th:value="${hecho.id}" />
                                <input type="hidden" name="nuevoEstado" value="ACEPTADO" />
                                <input type="hidden" name="sugerencia" value="" />
                                <button type="submit" class="accept">Aceptar</button>
                            </form>
                            <form th:action="@{/admin/hechos}" method="post">
                                <input type="hidden" name="idHecho" th:value="${hecho.id}" />
                                <input type="hidden" name="nuevoEstado" value="RECHAZADO" />
                                <input type="hidden" name="sugerencia" value="" />
                                <button type="submit" class="reject">Rechazar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</th:block>
</html>
