<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="acciones-adminsuperior">

    <div class="adminsuperior-section">
        <h2 class="section-title">
            <i class="fas fa-database me-2"></i> Fuentes
        </h2>

        <form class="form-accion"
              th:action="@{/admin/adminsuperior/fuentes/actualizar}" method="post">
            <button type="submit" class="btn-action">
                <i class="fas fa-sync-alt me-2"></i>
                Actualizar Fuentes Forzosamente
            </button>
        </form>

    </div>

    <div class="adminsuperior-section">
        <h2 class="section-title">
            <i class="fas fa-layer-group me-2"></i> Colecciones
        </h2>

        <form class="form-accion"
              th:action="@{/admin/adminsuperior/colecciones/actualizar}" method="post">
            <button type="submit" class="btn-action">
                <i class="fas fa-sync me-2"></i>
                Actualizar Colecciones Forzosamente
            </button>
        </form>

        <form class="form-accion"
              th:action="@{/admin/adminsuperior/colecciones/curar}" method="post">
            <button type="submit" class="btn-action">
                <i class="fas fa-wrench me-2"></i>
                Curar Colecciones Forzosamente
            </button>
        </form>

    </div>

</div>

</html>
