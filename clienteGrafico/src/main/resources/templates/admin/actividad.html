<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<th:block th:fragment="actividad">
    <section class="estadisticas-actividad">
        <h1 class="titulo">Estadísticas</h1>

        <div class="cards">
            <!-- Card 1: Provincia con más hechos -->
            <div class="card">
                <h2>Provincia con más hechos</h2>
                <div class="kpi">
                    <div>
                        <p th:if="${resumen.provinciaTop != null}"
                           th:text="${#strings.concat(resumen.provinciaTop, ' (', resumen.hechosProvinciaTop, ' hechos)')}">
                            Provincia X (N hechos)
                        </p>
                        <p th:if="${resumen.provinciaTop == null}">
                            No hay datos calculados todavía.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Card 2: Categoría con más hechos -->
            <div class="card">
                <h2>Categoría con más hechos</h2>
                <div class="kpi">
                    <div>
                        <p th:if="${resumen.categoriaTop != null}"
                           th:text="${#strings.concat(resumen.categoriaTop, ' (', resumen.hechosCategoriaTop, ' hechos)')}">
                            Categoría Y (M hechos)
                        </p>
                        <p th:if="${resumen.categoriaTop == null}">
                            No hay datos calculados todavía.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Card 3: Solicitudes de eliminación -->
            <div class="card">
                <h2>Solicitudes de eliminación (spam)</h2>
                <div id="act-spam" class="kpi"
                     th:with="spam=${resumen.solicitudesSpam}, total=${resumen.solicitudesTotales},
                              pct=${total != null && total > 0 ? (spam * 100 / total) : 0}">
                    <span th:text="${#numbers.formatInteger(spam, 0)}">0</span>
                    /
                    <span th:text="${#numbers.formatInteger(total, 0)}">0</span>
                    &nbsp;(
                    <span th:text="${#numbers.formatInteger(pct, 0)}">0</span>%)
                    marcadas como spam
                </div>
            </div>
        </div>
    </section>
</th:block>
</html>
