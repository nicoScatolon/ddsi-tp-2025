<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="importar-hechos" class="importar-container">

    <div th:if="${success}" class="alert-message alert-success" style="margin-bottom: 1.5rem;">
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert-message alert-error" style="margin-bottom: 1.5rem;">
        <span th:text="${error}"></span>
    </div>

    <div class="info-banner">
        <svg class="info-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div>
            <h3>Información sobre la importación</h3>
            <p>Los archivos CSV serán guardados en la carpeta <code>filesystem-data/archivosCSV</code> y procesados automáticamente.</p>
        </div>
    </div>

    <form th:action="@{/admin/importar}" method="post" enctype="multipart/form-data" class="upload-form">

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
                <h3>Arrastra tu archivo CSV aquí</h3>
                <p>o haz clic para seleccionar</p>
                <input type="file" name="archivo" id="fileInput" accept=".csv" required hidden>
                <button type="button" class="btn-select" id="btnSelect">Seleccionar archivo</button>
            </div>

            <div class="file-info" id="fileInfo" style="display: none;">
                <div class="file-details">
                    <svg class="file-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <div class="file-text">
                        <span class="file-name" id="fileName"></span>
                        <span class="file-size" id="fileSize"></span>
                    </div>
                    <button type="button" class="btn-remove" id="btnRemove">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="alert-message" id="alertMessage" style="display: none;"></div>

        <div class="form-actions">
            <button type="submit" class="btn-submit" id="btnSubmit" disabled>
                <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                </svg>
                Importar archivo CSV
            </button>
        </div>
    </form>
</div>

</html>
