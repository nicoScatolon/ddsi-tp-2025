<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html}">

<th:block th:fragment="cssExtra">
    <link rel="stylesheet" th:href="@{/css/admin-panel/base.css}">
    <link rel="stylesheet" th:href="@{'/css/admin-panel/' + ${contentTemplate} + '.css'}">
</th:block>

<div th:fragment="contenido">
    <aside class="sidebar">
        <div class="sidebar-brand"><h2><strong>Panel Administración</strong></h2></div>
        <ul class="sidebar-menu">
            <!-- Resumen Actividad -->
            <li class="menu-item" th:classappend="${contentTemplate == 'actividad'} ? 'active'">
                <a th:if="${contentTemplate != 'actividad'}" href="/admin/actividad">Resumen Actividad</a>
                <span th:if="${contentTemplate == 'actividad'}" class="menu-link-disabled">Resumen Actividad</span>
            </li>

            <!-- Importar Hechos -->
            <li class="menu-item" th:classappend="${contentTemplate == 'importar-hechos'} ? 'active'">
                <a th:if="${contentTemplate != 'importar-hechos'}" href="/admin/importar">Importar Hechos</a>
                <span th:if="${contentTemplate == 'importar-hechos'}" class="menu-link-disabled">Importar Hechos</span>
            </li>

            <!-- Gestión de Hechos -->
            <li class="menu-item" th:classappend="${contentTemplate == 'gestion-hechos'} ? 'active'">
                <a th:if="${contentTemplate != 'gestion-hechos'}" href="/admin/hechos">Gestión de Hechos</a>
                <span th:if="${contentTemplate == 'gestion-hechos'}" class="menu-link-disabled">Gestión de Hechos</span>
            </li>

            <!-- Gestión de Colecciones -->
            <li class="menu-item" th:classappend="${contentTemplate == 'gestion-colecciones'} ? 'active'">
                <a th:if="${contentTemplate != 'gestion-colecciones'}" href="/admin/colecciones">Gestión de Colecciones</a>
                <span th:if="${contentTemplate == 'gestion-colecciones'}" class="menu-link-disabled">Gestión de Colecciones</span>
            </li>

            <!-- Solicitudes de Eliminación -->
            <li class="menu-item" th:classappend="${contentTemplate == 'solicitudes-eliminacion'} ? 'active'">
                <a th:if="${contentTemplate != 'solicitudes-eliminacion'}" href="/admin/solicitudes">Solicitudes de Eliminación</a>
                <span th:if="${contentTemplate == 'solicitudes-eliminacion'}" class="menu-link-disabled">Solicitudes de Eliminación</span>
            </li>

            <!-- Gestión de Categorías -->
            <li class="menu-item" th:classappend="${contentTemplate == 'gestion-categorias'} ? 'active'">
                <a th:if="${contentTemplate != 'gestion-categorias'}" href="/admin/categorias">Gestión de Categorías</a>
                <span th:if="${contentTemplate == 'gestion-categorias'}" class="menu-link-disabled">Gestión de Categorías</span>
            </li>
        </ul>
    </aside>

    <div class="panel-wrapper">
        <div class="panel-card">
            <h1 th:text="${titulo}"></h1>
            <div th:replace="~{'admin/' + ${contentTemplate} :: ${contentTemplate}}"></div>
        </div>
    </div>
</div>

<th:block th:fragment="jsExtra">
    <script th:if="${contentTemplate == 'gestion-hechos'}" th:src="@{/js/gestion-hechos.js}"></script>
    <script th:if="${contentTemplate == 'importar-hechos'}" th:src="@{/js/importar-hechos.js}"></script>
    <script th:if="${contentTemplate == 'gestion-categorias'}" th:src="@{/js/gestion-categorias.js}"></script>
</th:block>

</html>
