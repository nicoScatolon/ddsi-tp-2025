<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' - MetaMapa'"></title>

    <!-- importar fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- importar estilos y layout-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- importar íconos-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="/img/icon.ico">

    <!-- CSS base -->
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <!-- Css reemplazable -->
    <th:block th:replace="~{::cssExtra}"></th:block>

</head>
<body>
<!-- NAVBAR DESKTOP -->
<header class="desktop-nav">
    <nav>
        <div class="brand">
            <a th:href="@{/index}">
                <img src="/img/icon.ico" alt="MetaMapa Logo">
                <span class="site-name">MetaMapa</span>
            </a>
        </div>

        <ul class="nav-links">
            <li><a href="/hechos/create" class="btn btn-primary">+ Crear</a></li>
            <li><a href="/hechos">Explorar</a></li>
            <li><a href="/hechos/map">Mapa</a></li>
            <li><a href="/colecciones">Colecciones</a></li>
            <li><a href="/about">Nosotros</a></li>
        </ul>

        <!-- Right-side area: authButtons (guest) OR desktop single user/admin button -->
        <div class="right-controls">

            <!-- Si el usuario NO está logueado -->
            <div sec:authorize="!isAuthenticated()" class="login">
                <a th:href="@{/login}" class="btn btn-secondary" id="desktopLoginBtn">Ingresar</a>
                <a th:href="@{/signup}" class="btn btn-secondary" id="desktopSignupBtn">Registrarse</a>
            </div>

            <!-- Si el usuario está logueado -->
            <div sec:authorize="isAuthenticated()" id="desktopUserContainer">
                <button id="desktopUserBtn" class="btn btn-secondary" type="button" aria-haspopup="true" aria-expanded="false">
                    <!-- Ícono según rol -->
                    <span id="desktopUserLabel">
                            <i sec:authorize="hasRole('CONTRIBUYENTE')" class="fas fa-user"></i>
                            <i sec:authorize="hasRole('ADMIN')" class="fas fa-user-cog admin-icon"></i>
                        </span>
                </button>

                <div id="desktopUserDropdown">
                    <!-- Opciones para ADMIN -->
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}" class="dropdown-admin">
                        Panel de administrador
                    </a>

                    <!-- Opciones para USER -->
                    <a sec:authorize="hasAnyRole('CONTRIBUYENTE','ADMIN')" th:href="@{/profile}" class="dropdown-link">
                        Mi Perfil
                    </a>
                    <a sec:authorize="hasAnyRole('CONTRIBUYENTE','ADMIN')" th:href="@{/mis-hechos}" class="dropdown-link">
                        Mis Hechos
                    </a>
                    <a sec:authorize="hasAnyRole('CONTRIBUYENTE','ADMIN')" th:href="@{/mis-solicitudes}" class="dropdown-link">
                        Mis Solicitudes
                    </a>

                    <!-- Logout -->
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="dropdown-logout">
                            Cerrar Sesión
                        </button>
                    </form>
                </div>
            </div>
        </div>


    </nav>
</header>

<!-- Contenido principal -->
<main class="container-fluid my-4 flex-grow-1">
    <div th:replace="~{${contenido} :: contenido}"></div>
</main>
</body>

<footer>
    <p>© 2025 MetaMapa - Todos los derechos reservados</p>
    <a href="/legales">Información legal | Privacidad</a>
</footer>

<script th:src="@{/js/navbar.js}"></script>
<th:block th:replace="~{::jsExtra}"></th:block>
</html>
